<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BXG Draft Ultimate</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
text-align:center;
margin:0;
}

header{
background:#020617;
padding:20px;
font-size:24px;
}

button{
padding:12px 22px;
margin:8px;
font-size:16px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

.menu{
margin-top:40px;
}

.card{
width:180px;
background:#1e293b;
border-radius:12px;
display:inline-block;
margin:10px;
padding:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:120px;
height:120px;
object-fit:cover;
border-radius:8px;
}

.Comun{border:3px solid gray;}
.Oro{border:3px solid gold;}
.Icono{border:3px solid purple;box-shadow:0 0 10px purple;}
.Legendaria{border:4px solid gold;box-shadow:0 0 25px gold;}

#game{
display:none;
margin-top:20px;
}

</style>

</head>

<body>

<header>
⚽ BXG Draft Ultimate
</header>

<div class="menu" id="menu">

<h2>Menú</h2>

<button onclick="iniciarJuego()">Jugar</button>
<button onclick="mostrarTienda()">Tienda</button>

</div>

<div id="game">

<h2>💰 Monedas: <span id="coins">100</span></h2>

<button onclick="abrirSobre()">Abrir Sobre (10)</button>
<button onclick="generarOpciones()">Draft</button>

<div id="cardArea"></div>

<h2>Equipo</h2>
<div id="equipo"></div>

<h2>Química: <span id="chem">0</span></h2>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/10/25/audio_946a1b8e54.mp3" type="audio/mpeg">
</audio>

<script>

let monedas=100
let equipo=[]

function iniciarJuego(){
document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"
document.getElementById("music").play()
}

function actualizarMonedas(){
document.getElementById("coins").innerText=monedas
}

const basePlayers=[

{name:"Lionel Messi",pos:"RW",img:"https://upload.wikimedia.org/wikipedia/commons/8/89/Leo_Messi_20180626.jpg"},
{name:"Cristiano Ronaldo",pos:"ST",img:"https://upload.wikimedia.org/wikipedia/commons/8/8c/Cristiano_Ronaldo_2018.jpg"},
{name:"Neymar",pos:"LW",img:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Neymar_2018.jpg"},
{name:"Kylian Mbappé",pos:"ST",img:"https://upload.wikimedia.org/wikipedia/commons/8/86/Kylian_Mbappe_2018.jpg"},
{name:"Erling Haaland",pos:"ST",img:"https://upload.wikimedia.org/wikipedia/commons/9/9c/Erling_Haaland_2020.jpg"}

]

function generarCartas(total=600){

let cartas=[]

for(let i=0;i<total;i++){

let base=basePlayers[Math.floor(Math.random()*basePlayers.length)]

let rating=Math.floor(Math.random()*30)+70

let r=Math.random()

let rareza="Comun"

if(r>0.95) rareza="Legendaria"
else if(r>0.85) rareza="Icono"
else if(r>0.65) rareza="Oro"

cartas.push({
nombre:base.name,
pos:base.pos,
img:base.img,
rating:rating,
rareza:rareza
})

}

return cartas

}

let cartasJuego=generarCartas()

function abrirSobre(){

if(monedas<10){
alert("No tienes monedas")
return
}

monedas-=10
actualizarMonedas()

let carta=cartasJuego[Math.floor(Math.random()*cartasJuego.length)]

mostrarCarta(carta)

}

function mostrarCarta(carta){

let html=`
<div class="card ${carta.rareza}">
<img src="${carta.img}">
<h3>${carta.nombre}</h3>
<p>${carta.pos}</p>
<p>⭐ ${carta.rating}</p>
<p>${carta.rareza}</p>
</div>
`

document.getElementById("cardArea").innerHTML=html

}

function generarOpciones(){

let area=document.getElementById("cardArea")

area.innerHTML=""

for(let i=0;i<5;i++){

let carta=cartasJuego[Math.floor(Math.random()*cartasJuego.length)]

let div=document.createElement("div")

div.className="card "+carta.rareza

div.innerHTML=`
<img src="${carta.img}">
<h3>${carta.nombre}</h3>
<p>${carta.pos}</p>
<p>⭐ ${carta.rating}</p>
`

div.onclick=function(){
agregarEquipo(carta)
}

area.appendChild(div)

}

}

function agregarEquipo(carta){

if(equipo.length>=11){
alert("Equipo lleno")
return
}

equipo.push(carta)

renderEquipo()

}

function renderEquipo(){

let html=""

equipo.forEach(j=>{
html+=`
<div class="card ${j.rareza}">
<img src="${j.img}">
<p>${j.nombre}</p>
<p>${j.rating}</p>
</div>
`
})

document.getElementById("equipo").innerHTML=html

calcularQuimica()

}

function calcularQuimica(){

if(equipo.length==0)return

let total=0

equipo.forEach(j=>{
total+=j.rating
})

let chem=Math.floor(total/equipo.length)

document.getElementById("chem").innerText=chem

}

</script>

</body>
</html>
